train:
  algo: ${hydra:runtime.choices.algorithm}
  algos: null
  total_timesteps: 200000
  # 作为 algorithm.<algo> 的覆盖层；不填则使用算法默认参数
  algo_kwargs: {}
  parallel_multi_algo: true
  resume: true
  fixed_reset_seed: 42
  model_path: trained_models/{algo}_local
  log_json: logs/training_log_local_{algo}.json
  metric_jsonl: logs/train_metrics_{algo}.jsonl
  metrics_log_every_steps: 100
  metrics_include_step_reward: false
  metrics_include_timestamp: true

eval:
  algo: null
  algos: null
  episodes: 30
  output_json: results/eval_metrics_local_{algo}.json

plot:
  learning_curve: plots/learning_curve_local.png
  eval_summary: plots/eval_summary_local.png
